<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shopping Chatbot</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 400px;
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
    }

    #chat-box {
      height: 400px;
      overflow-y: auto;
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 10px;
    }

    .user {
      text-align: right;
      color: blue;
      margin: 10px 0;
    }

    .bot {
      text-align: left;
      color: green;
      margin: 10px 0;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
    }

    button {
      padding: 10px 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="chat-container">
    <h2>Shopping Chatbot</h2>

    <div id="chat-box"></div>

    <div class="input-area">
      <input type="text" id="message" placeholder="Ask about products..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById("message");
      const chatBox = document.getElementById("chat-box");

      const message = input.value;

      if (!message) return;

      // Show user message
      chatBox.innerHTML += `<div class="user"><b>You:</b> ${message}</div>`;

      input.value = "";

      try {
        const response = await fetch("http://localhost:5000/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ message }),
        });

        const data = await response.json();

        // Show bot reply
        chatBox.innerHTML += `<div class="bot"><b>Bot:</b> ${data.reply}</div>`;

        chatBox.scrollTop = chatBox.scrollHeight;

      } catch (error) {
        console.log(error);

        chatBox.innerHTML += `<div class="bot">Error connecting server</div>`;
      }
    }
  </script>

</body>
</html>
